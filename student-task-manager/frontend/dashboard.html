<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Task Manager - Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <h2>Student Task Manager</h2>
    </div>
    <div class="nav-user">
      <span id="userName">Welcome</span>
      <button id="logoutBtn" class="btn btn-secondary">Logout</button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Tasks</h3>
        <p id="statTotal">0</p>
      </div>
      <div class="stat-card completed">
        <h3>Completed</h3>
        <p id="statCompleted">0</p>
      </div>
      <div class="stat-card pending">
        <h3>Pending</h3>
        <p id="statPending">0</p>
      </div>
      <div class="stat-card overdue">
        <h3>Overdue</h3>
        <p id="statOverdue">0</p>
      </div>
    </div>

    <div class="dashboard-header">
      <h2>My Tasks</h2>
      <button id="addTaskBtn" class="btn btn-primary">+ Add New Task</button>
    </div>

    <div class="filters-section">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search tasks...">
      </div>
      <div class="filter-group">
        <select id="filterSubject">
          <option value="All">All Subjects</option>
        </select>
        <select id="filterPriority">
          <option value="All">All Priorities</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
        <select id="filterStatus">
          <option value="All">All Status</option>
          <option value="Pending">Pending</option>
          <option value="Completed">Completed</option>
        </select>
        <select id="sortBy">
          <option value="deadline">Sort by Deadline</option>
          <option value="priority">Sort by Priority</option>
          <option value="createdAt">Sort by Created</option>
        </select>
      </div>
    </div>

    <div id="taskList" class="task-list"></div>

    <div id="emptyState" class="empty-state hidden">
      <p>No tasks found. Add your first task!</p>
    </div>
  </div>

  <div id="taskModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Task</h3>
        <button class="close-modal">&times;</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label for="taskTitle">Title *</label>
          <input type="text" id="taskTitle" required placeholder="Task title">
        </div>
        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" rows="3" placeholder="Task description"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskSubject">Subject *</label>
            <input type="text" id="taskSubject" required placeholder="e.g., Math, Science">
            <datalist id="subjectList"></datalist>
          </div>
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="taskDeadline">Deadline *</label>
          <input type="datetime-local" id="taskDeadline" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelTaskBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveTaskBtn">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/dashboard.js"></script>
</body>
</html>
